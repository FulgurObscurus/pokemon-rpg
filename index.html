<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon RPG — 151 покемон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script>window.onerror=function(m,s,l){var d=document.getElementById("loading");if(d){d.style.display="block";d.textContent="JS ОШИБКА строка "+l+": "+m;}alert("Ошибка: "+m+"\nСтрока: "+l);};</script>
<div id="game">
    <div id="loading">⏳ Загрузка данных покемонов...</div>

    <div id="battle-screen" style="display:none;">Добро пожаловать в мир покемонов!<br>Нажмите "Исследовать" чтобы начать.</div>

    <div id="hp-bars" style="display:none;">
        <div class="hp-bar">
            <span class="name">Ваш:</span>
            <span id="p-name">—</span> (Ур. <span id="p-level">0</span>)
            <div class="hp" id="p-hp-bar" style="width:100%"></div>
            HP: <span id="p-hp-text">0/0</span>
        </div>
        <div class="hp-bar">
            <span class="name">Дикий:</span>
            <span id="e-name">—</span> (Ур. <span id="e-level">0</span>)
            <div class="hp" id="e-hp-bar" style="width:100%"></div>
            HP: <span id="e-hp-text">0/0</span>
        </div>
    </div>

    <div id="actions" style="display:none;">
        <button id="btn-fight">🌲 Исследовать</button>
        <button id="btn-bag" disabled>Инвентарь</button>
        <button id="btn-switch" disabled>Сменить</button>
        <button id="btn-run" disabled>Сбежать</button>
    </div>

    <div id="move-list" style="display:none;"></div>

    <div id="info-panel" style="display:none;">
        <span>💰 <span id="money">300</span></span>
        <span>📍 <span id="location">Маршрут 1</span></span>
        <span>📦 <span id="party-count">0</span></span>
        <span><button id="btn-save" style="background:none;border:none;color:#f1c40f;font-size:14px;cursor:pointer;">💾 Сохранить</button></span>
        <span><button id="btn-training" style="background:none;border:none;color:#4CAF50;font-size:14px;cursor:pointer;">🏋️ Тренировка</button></span>
        
        
    </div>

    <div id="controls" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; max-width:300px; margin:10px auto; justify-items:center;">
        <button id="btn-up" style="grid-column:2; padding:12px 20px; font-size:24px; border:2px solid #7b4a9e; border-radius:8px; background:#1a0f2e; color:#fff; touch-action:none;">▲</button>
        <button id="btn-left" style="grid-column:1; grid-row:2; padding:12px 20px; font-size:24px; border:2px solid #7b4a9e; border-radius:8px; background:#1a0f2e; color:#fff; touch-action:none;">◄</button>
        <button id="btn-right" style="grid-column:3; grid-row:2; padding:12px 20px; font-size:24px; border:2px solid #7b4a9e; border-radius:8px; background:#1a0f2e; color:#fff; touch-action:none;">►</button>
        <button id="btn-down" style="grid-column:2; grid-row:3; padding:12px 20px; font-size:24px; border:2px solid #7b4a9e; border-radius:8px; background:#1a0f2e; color:#fff; touch-action:none;">▼</button>
        <button id="btn-action" style="grid-column:2; grid-row:4; padding:10px 16px; font-size:16px; border:2px solid #7b4a9e; border-radius:8px; background:#f1c40f; color:#1a0f2e; font-weight:bold; touch-action:none;">⚔️ Исследовать</button>
    </div>

    <div id="inventory-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#2c1a3d; padding:20px; border-radius:16px; border:2px solid #7b4a9e; max-width:400px; width:90%; color:#fff;">
            <h3 style="text-align:center; margin-bottom:15px;">🎒 Инвентарь</h3>
            <div id="inventory-items" style="margin-bottom:15px;"></div>
            <button id="inv-close" style="width:100%; padding:10px; background:#7b4a9e; color:#fff; border:none; border-radius:8px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <!-- Меню Тренировки (по системе Pokemon Champions) -->
    <div id="training-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1001; overflow-y:auto; justify-content:center; align-items:flex-start;">
        <div style="background:#2c1a3d; padding:16px; border-radius:16px; border:2px solid #7b4a9e; max-width:440px; width:95%; color:#fff; margin:10px auto; max-height:95vh; overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h3 style="margin:0;color:#f1c40f;">🏋️ Тренировка</h3>
                <button id="train-close-btn" style="background:#c0392b;border:none;color:#fff;border-radius:8px;cursor:pointer;padding:6px 14px;">✕ Закрыть</button>
            </div>
            <div id="train-team" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;justify-content:center;"></div>
            <div id="train-content"></div>
            <button id="train-confirm-btn" style="display:none;width:100%;padding:12px;background:#27ae60;border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:16px;font-weight:bold;margin-top:8px;">✅ Подтвердить изменения</button>
        </div>
    </div>
</div>

<script src="globals.js"></script>
<script src="pokemon-class.js"></script>
<script src="constants.js"></script>
<script src="helpers.js"></script>
<script src="type-effectiveness.js"></script>
<script src="pokedex.js"></script>
<script src="moves.js"></script>
<script src="learnsets.js"></script>
<script src="load-data.js"></script>
<script src="battle.js"></script>
<script src="map.js"></script>
<script src="training.js"></script>
<script src="init.js?v=3"></script>
<script>
let isReloading = false;
window.addEventListener("beforeunload", function(e) {
    if (!isReloading) {
        navigator.sendBeacon("/shutdown");
    }
});
window.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "r") {
        isReloading = true;
        setTimeout(() => { isReloading = false; }, 2000);
    }
});
</script>
</body>
</html>
