<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pokémon RPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">

    <div id="loading">⏳ Загрузка данных покемонов...</div>

    <div id="battle-screen" style="display:none;">Добро пожаловать в мир покемонов!<br>Нажмите "Исследовать" чтобы начать.</div>

    <div id="hp-bars" style="display:none;">
        <div class="hp-bar"><span class="name">Ваш:</span> <span id="p-name">—</span> (Ур. <span id="p-level">0</span>)<div class="hp" id="p-hp-bar" style="width:100%"></div>HP: <span id="p-hp-text">0/0</span></div>
        <div class="hp-bar"><span class="name">Дикий:</span> <span id="e-name">—</span> (Ур. <span id="e-level">0</span>)<div class="hp" id="e-hp-bar" style="width:100%"></div>HP: <span id="e-hp-text">0/0</span></div>
    </div>

    <div id="actions" style="display:none;">
        <button id="btn-fight">🌲 Исследовать</button>
        <button id="btn-bag" disabled>Инвентарь</button>
        <button id="btn-switch" disabled>Сменить</button>
        <button id="btn-run" disabled>Сбежать</button>
    </div>

    <div id="move-list" style="display:none;"></div>

    <div id="info-panel" style="display:none;">
        <span>💰 <span id="money">300</span></span>
        <span>📍 <span id="location">Маршрут 1</span></span>
        <span>📦 <span id="party-count">0</span></span>
        <span><button id="btn-save">💾 Сохранить</button></span>
        <span><button id="btn-export">📤 Экспорт</button></span>
        <span><button id="btn-import">📥 Импорт</button></span>
    </div>

    <div id="controls" style="display:none;">
        <button id="btn-up">▲</button>
        <button id="btn-left"></button>
        <button id="btn-right">►</button>
        <button id="btn-down">▼</button>
        <button id="btn-action">⚔️ Исследовать</button>
    </div>

    <div id="inventory-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#2c1a3d; padding:20px; border-radius:16px; border:2px solid #7b4a9e; max-width:400px; width:90%; color:#fff;">
            <h3 style="text-align:center; margin-bottom:15px;">🎒 Инвентарь</h3>
            <div id="inventory-items" style="margin-bottom:15px;"></div>
            <button id="inv-close" style="width:100%; padding:10px; background:#7b4a9e; color:#fff; border:none; border-radius:8px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

</div>

<script src="globals.js"></script>
<script src="pokemon-class.js"></script>
<script src="constants.js"></script>
<script src="helpers.js"></script>
<script src="type-effectiveness.js"></script>
<script src="pokedex.js"></script>
<script src="load-data.js"></script>
<script src="battle.js"></script>
<script src="map.js"></script>
<script src="init.js"></script>

<!-- Диагностика после загрузки всех скриптов -->
<script>
window.addEventListener('load', function() {
    var btnAction = document.getElementById('btn-action');
    var debugInfo = [];
    
    debugInfo.push('=== Диагностика ===');
    debugInfo.push('btn-action найден: ' + (btnAction ? 'да' : 'нет'));
    debugInfo.push('window.startExplore: ' + (typeof window.startExplore));
    debugInfo.push('window.generateWildPokemon: ' + (typeof window.generateWildPokemon));
    debugInfo.push('allPokemon: ' + (typeof allPokemon !== 'undefined' ? allPokemon.length + ' шт' : 'не определён'));
    debugInfo.push('');
    debugInfo.push('Нажми "Исследовать" для теста');
    
    if (btnAction) {
        btnAction.onclick = function() {
            if (typeof window.startExplore === 'function') {
                window.startExplore();
            } else {
                alert('startExplore не найден!');
            }
            return false;
        };
    }
    
    // Показываем диагностику в battle-screen
    var battleScreen = document.getElementById('battle-screen');
    if (battleScreen) {
        battleScreen.innerHTML = debugInfo.join('<br>');
        battleScreen.style.display = 'block';
    }
    
    setTimeout(function() {
        var bs = document.getElementById('battle-screen');
        if (bs) bs.style.display = 'none';
    }, 3000);
});
</script>
</body>
</html>
