<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon RPG — 151 покемон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
    <div id="loading">⏳ Загрузка данных покемонов...</div>
    <div id="battle-screen" style="display:none;">Добро пожаловать в мир покемонов!<br>Нажмите "Исследовать" чтобы начать.</div>
    <div id="hp-bars" style="display:none;">
        <div class="hp-bar"><span class="name">Ваш:</span> <span id="p-name">—</span> (Ур. <span id="p-level">0</span>)<div class="hp" id="p-hp-bar" style="width:100%"></div>HP: <span id="p-hp-text">0/0</span></div>
        <div class="hp-bar"><span class="name">Дикий:</span> <span id="e-name">—</span> (Ур. <span id="e-level">0</span>)<div class="hp" id="e-hp-bar" style="width:100%"></div>HP: <span id="e-hp-text">0/0</span></div>
    </div>
    <div id="actions" style="display:none;">
        <button id="btn-fight">🌲 Исследовать</button>
        <button id="btn-bag" disabled>🎒 Рюкзак</button>
        <button id="btn-switch" disabled>🔄 Сменить</button>
        <button id="btn-run" disabled>🏃 Сбежать</button>
    </div>
    <div id="move-list" style="display:none;"></div>
    <div id="info-panel" style="display:none;">
        <span>💰 <span id="money">300</span></span>
        <span>📍 <span id="location">Маршрут 1</span></span>
        <span>📦 <span id="party-count">0</span></span>
        <span><button id="btn-save" style="background:none;border:none;color:#f1c40f;font-size:14px;cursor:pointer;">💾 Сохранить</button></span>
        <span><button id="btn-export" style="background:none;border:none;color:#f1c40f;font-size:14px;cursor:pointer;">📤 Экспорт</button></span>
        <span><button id="btn-import" style="background:none;border:none;color:#f1c40f;font-size:14px;cursor:pointer;">📥 Импорт</button></span>
    </div>
</div>
<script src="globals.js"></script>
<script src="pokemon-class.js"></script>
<script src="constants.js"></script>
<script src="helpers.js"></script>
<script src="type-effectiveness.js"></script>
<script src="pokedex.js"></script>
<script src="load-data.js"></script>
<script src="battle.js"></script>
<script src="init.js"></script>
<div id="debug" style="background: #1a0f2e; color: #ffcc00; padding: 10px; margin-top: 15px; border: 1px solid #7b4a9e; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto;"></div>
</body>
</html>
